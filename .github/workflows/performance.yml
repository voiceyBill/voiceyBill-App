name: Performance Monitoring

on:
  pull_request:
    paths:
      - "src/**"
      - "package.json"
      - ".github/workflows/performance.yml"
  push:
    branches: ["main", "master"]

permissions:
  pull-requests: write
  contents: read

jobs:
  bundle-size:
    name: Check bundle size
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Calculate bundle size
        id: bundle
        run: |
          # Use npx so no global-install permission issues on the runner.
          # @size-limit/file measures raw source file sizes — appropriate for
          # a React Native project where the Metro bundle is built by EAS, not CI.
          npx --yes size-limit > bundle-report.txt 2>&1 || true

          cat bundle-report.txt

          # Write output using heredoc so multi-line content doesn't break
          # the GITHUB_OUTPUT key=value parser (single-line echo would cause
          # the runner to error on newlines, bypassing continue-on-error).
          echo "report<<BUNDLE_EOF" >> "$GITHUB_OUTPUT"
          cat bundle-report.txt >> "$GITHUB_OUTPUT"
          echo "BUNDLE_EOF" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Comment on PR with bundle info
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '📦 **Bundle Analysis**\n\nBundle size analysis completed. Please review the changes to ensure they do not significantly increase the app size.\n\n**Tips:**\n- Keep assets optimized and compressed\n- Use code splitting for large features\n- Monitor third-party dependencies\n- Consider lazy loading for routes'
            })

  dependency-check:
    name: Analyze dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check for duplicate packages
        run: npm ls --all 2>&1 | grep "deduped" || echo "No duplicates found"

      - name: Analyze critical dependencies
        run: |
          echo "=== React Native Ecosystem Check ==="
          npm ls react react-native expo 2>&1 | head -20 || true

          echo ""
          echo "=== Total dependencies ==="
          npm ls --depth=0 2>&1 | tail -5 || true

  type-coverage:
    name: Type safety check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check TypeScript coverage
        run: |
          echo "Checking TypeScript type coverage..."
          npx tsc --noEmit --skipLibCheck

          # Count TypeScript files
          TS_FILES=$(find src -name "*.ts" -o -name "*.tsx" | wc -l)
          echo "Total TypeScript files: $TS_FILES"
