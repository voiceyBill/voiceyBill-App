name: Documentation & PR Guidelines Check

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  validate-pr-description:
    name: Validate PR description
    runs-on: ubuntu-latest
    steps:
      - name: Check PR description
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const title = pr.title || '';

            const hasDescription = body.length > 20;
            const hasType = title.match(/^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)/i);

            if (!hasDescription) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '⚠️ **PR Description Missing**\n\nPlease add a detailed description of your changes. Include:\n- What problem does this solve?\n- How does it solve the problem?\n- Any breaking changes?\n- Screenshots/videos if applicable (especially for UI changes)'
              });
            }

      - name: Check for related issues
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';

            const hasIssueReference = /(?:fixes|closes|resolves)\s+#\d+/i.test(body) || 
                                     /issue\s+#\d+/i.test(body) ||
                                     /related\s+to\s+#\d+/i.test(body);

            if (!hasIssueReference) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '💡 **Tip**: Link this PR to related issues using keywords like `fixes #123` or `resolves #456` in your PR description for better tracking.'
              });
            }

  check-file-patterns:
    name: Check important files
    if: ${{ github.event.pull_request.head.repo.fork == false }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate files modified
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            try {
              const files = execSync('git diff --name-only HEAD~1').toString().split('\n').filter(Boolean);
              
              const criticalFiles = ['package.json', 'tsconfig.json', 'app.json', 'babel.config.js'];
              const modified = files.filter(f => criticalFiles.includes(f));

              if (modified.length > 0) {
                console.log('Modified critical files:', modified.join(', '));
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: `⚠️ **Critical Files Modified**\n\nYou've modified: ${modified.join(', ')}\n\nPlease ensure:\n- Dependencies are properly tested\n- Configuration changes are documented\n- No breaking changes are introduced`
                });
              }
            } catch (error) {
              console.log('First commit or no previous commits');
            }
