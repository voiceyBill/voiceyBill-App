name: PR Writes (labels & comments)

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  apply-labels-and-comment:
    name: Apply labels and post comments (trusted)
    runs-on: ubuntu-latest
    steps:
      - name: Apply path labels (base repo)
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labelersconfig.yml
        continue-on-error: true

      - name: Post bundle analysis comment (trusted)
        uses: actions/github-script@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: '📦 **Bundle Analysis**\n\nBundle size analysis completed (trusted job). If the PR author relies on forked runs, this comment provides the summary.'
            })
